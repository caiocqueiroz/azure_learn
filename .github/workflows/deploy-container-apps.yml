name: Deploy Container Apps

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build, push, and deploy
        required: false
        default: latest
  push:
    branches:
      - main
    paths:
      - 'frontend-web/**'
      - 'services/**'
      - 'infra/terraform/**'
      - '.github/workflows/deploy-container-apps.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-container-apps-azure-dev
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: 'true'
  ARM_USE_OIDC: 'true'
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_location: ${{ vars.AZURE_LOCATION }}
  TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP }}
  TF_VAR_environment_name: ${{ vars.ACA_ENVIRONMENT_NAME }}
  TF_VAR_acr_name: ${{ vars.ACR_NAME }}
  TF_VAR_image_tag: ${{ inputs.image_tag || github.sha }}
  TF_VAR_taskflow_api_key: ${{ secrets.TASKFLOW_API_KEY }}

jobs:
  deploy:
    name: Build images and apply Terraform
    runs-on: ubuntu-latest
    environment: azure-dev
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Azure login with OIDC
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.10.5

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -input=false

      - name: Read ACR login server
        id: acr
        run: echo "login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        run: az acr login --name "$TF_VAR_acr_name"
        working-directory: .

      - name: Build and push container images
        working-directory: .
        run: |
          set -euo pipefail
          apps=(frontend-web api-gateway task-service user-service notification-service worker-service)
          for app in "${apps[@]}"; do
            context="frontend-web"
            if [ "$app" != "frontend-web" ]; then
              context="services/$app"
            fi
            docker build -t "${{ steps.acr.outputs.login_server }}/taskflow/$app:${TF_VAR_image_tag}" "$context"
            docker push "${{ steps.acr.outputs.login_server }}/taskflow/$app:${TF_VAR_image_tag}"
          done

      - name: Apply image tag through Terraform
        env:
          TF_VAR_deploy_container_apps: 'true'
        run: terraform apply -auto-approve -input=false
